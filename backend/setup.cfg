# Production-ready environment configuration

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests

[coverage:run]
branch = True
omit =
    */site-packages/*
    */distutils/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
