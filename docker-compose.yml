version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job_assistant_db
    environment:
      POSTGRES_USER: jobassistant
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_assistant_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job_assistant_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_assistant_backend
    environment:
      DATABASE_URL: postgresql://jobassistant:password@postgres:5432/job_assistant_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - job_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_assistant_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    networks:
      - job_network

volumes:
  postgres_data:

networks:
  job_network:
    driver: bridge
